<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квест НЦ Россия</title>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background-color: #0d3168; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn { display: block; width: 100%; padding: 15px; margin-top: 10px; background: #dc2626; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; }
        .hidden { display: none; }
        h1 { font-size: 1.2rem; text-align: center; color: #0d3168; }
        .hint { background: #f1f5f9; padding: 15px; border-radius: 10px; font-size: 0.9rem; font-style: italic; }
    </style>
</head>
<body>

<div class="card" id="app">
    <div id="screen-welcome">
        <h1>НАЦИОНАЛЬНЫЙ ЦЕНТР «РОССИЯ»</h1>
        <p>Здравствуй! Отвечай на вопросы и проходи квест.</p>
        <button class="btn" onclick="startQuest()">НАЧАТЬ КВЕСТ</button>
    </div>
</div>

<script>
    const questData = {
        "start": { q: "Деревянные подружки\nЛюбят прятаться друг в дружке,\nНосят яркие одёжки,\nНазываются — …", opts: ["Ладошки", "Сережки", "Матрешки"], ans: "Матрешки", hint: "Найди самую маленькую матрешку в зоне «О России»", next: "q2" },
        "q2": { q: "Сколько субъектов РФ входит в состав Сибирского федерального округа (СФО)?", opts: ["8", "11", "10"], ans: "10", hint: "Поднимись по эскалатору — вперёд гляди, У дверей на выставку QR-код найди.", next: "q3" },
        "q3": { q: "Как называется село, где расположен музей-заповедник, связанный с периодом сибирской ссылки В. И. Ленина?", opts: ["Овсянка", "Шушенское", "Тасеево"], ans: "Шушенское", hint: "В гости к Греку ты пойдешь, QR-код у двери игротеки найдешь.", next: "q4" },
        "q4": { q: "Какой сибирский писатель, уроженец Красноярского края, известен книгами о природе и деревенской жизни?", opts: ["Вячеслав Шишков", "Виктор Астафьев", "Александр Вампилов"], ans: "Виктор Астафьев", hint: "Среди даров тайги, варенья и чаёв Код продолжения пути найдёшь ты вновь (в сувенирном магазине).", next: "q5" },
        "q5": { q: "Какой национальный парк знаменит сиенитовыми скалами?", opts: ["Шушенский бор", "Ергаки", "Красноярские Столбы"], ans: "Красноярские Столбы", hint: "Перед тем, как в зал идти, Туда одежду отнеси (гардероб).", next: "q6" },
        "q6": { q: "Где находится географический центр России?", opts: ["озеро Виви", "озеро Байкал", "озеро Кета"], ans: "озеро Виви", hint: "Не тренажёрный зал, но «пресс» тут есть, Новости, интервью — ищи в пресс-центре.", next: "q7" },
        "q7": { q: "В каком году был основан Красноярский острог?", opts: ["1628", "1636", "1618"], ans: "1628", hint: "Не стадион, не театр, не кино, Ищи в мультиформатном зале.", next: "q8" },
        "q8": { q: "Какой знаменитый русский художник родился в Красноярске?", opts: ["Иван Шишкин", "Василий Суриков", "Виктор Васнецов"], ans: "Василий Суриков", hint: "Просторный, красивый, со сценой большой, Сюда приезжают артист и герой.", next: "q9" },
        "q9": { q: "Какой оперный певец стал известен благодаря победе на конкурсе «Певец мира»?", opts: ["Анна Нетребко", "Дмитрий Хворостовский", "Федор Шаляпин"], ans: "Дмитрий Хворостовский", hint: "Ступени ведут не на сцену, а ввысь, Место покоя в амфитеатре — просто садись!", next: "q10" },
        "q10": { q: "В какое море впадает Енисей?", opts: ["Карское море", "море Лаптевых", "Чукотское море"], ans: "Карское море", hint: "Здесь кружева вологодские нежно лежат, Янтарь тёплый в универмаге горит.", next: "q11" },
12:25
"q11": { q: "Какой город края — крупнейший центр цветной металлургии (никель, медь)?", opts: ["Норильск", "Медногорск", "Каменск-Уральский"], ans: "Норильск", hint: "Ты на кассу в гастроряды подойди, Последний QR-код получи.", next: "q12" },
        "q12": { q: "Как называется крупнейшая ГЭС России, расположенная на Енисее?", opts: ["Саяно-Шушенская ГЭС", "Братская ГЭС", "Красноярская ГЭС"], ans: "Саяно-Шушенская ГЭС", hint: "Поздравляем! Ты завершил квест! Подойди к кассиру за призом.", next: "finish" }
    };

    const app = document.getElementById('app');

    function startQuest() {
        localStorage.setItem('current_step', 'start');
        render('start');
    }

    function render(key) {
        if (key === 'finish') {
            app.innerHTML = `<h1>Квест завершен!</h1><p>Покажи этот экран кассиру.</p><div class="hint">Код: KRAS-` + Math.floor(Math.random()*9999) + `</div>`;
            return;
        }

        const data = questData[key];
        let html = `<h1>Вопрос</h1><p>${data.q.replace(/\n/g, '<br>')}</p>`;
        data.opts.forEach(opt => {
            html += `<button class="btn" onclick="check('${key}', '${opt}')">${opt}</button>`;
        });
        app.innerHTML = html;
    }

    function check(key, answer) {
        const data = questData[key];
        if (answer === data.ans) {
            if (data.next === 'finish') {
                render('finish');
            } else {
                app.innerHTML = `<h1>Верно!</h1><div class="hint">${data.hint}</div><button class="btn" onclick="render('${data.next}')">Далее</button>`;
            }
        } else {
            alert("Неверно, попробуй еще раз!");
        }
    }

    // Загрузка
    const saved = localStorage.getItem('current_step');
    if (saved && questData[saved]) render(saved);
</script>

</body>
</html>
